# Конфигурация сообщений Telegram2FALogin (Русский)
# ---------------------------------------------------------
# Примечание: Вы можете использовать HTML-теги, такие как <b>, <i>, <code> и т.д. в сообщениях Telegram.
# Специальные плейсхолдеры перечислены под каждым сообщением.

# --- Сообщения в Minecraft (In-Game) ---

# Сообщение, когда IP находится в черном списке и игрок пытается зайти.
kick-blacklisted: "Ваш IP находится в черном списке!"

# Сообщение, когда OP-аккаунт не привязан к Telegram.
# %code% - Код привязки для игрока.
kick-unlinked: "Защита OP активна! Ваш аккаунт не привязан к Telegram. \n\nОтправьте этот код боту: %code% \nИспользуйте команду: /mclink %code%"

# Сообщение, когда ожидается проверка 2FA.
kick-2fa: "Проверка 2FA! Откройте Telegram, чтобы подтвердить вход."

# Использование команды /tg2fa settings.
mc-settings-usage: "Использование: /tg2fa settings <mode> (always|session|whitelist|disabled)"

# Ответ при успешном изменении режима 2FA.
# %mode% - Новый установленный режим.
mc-settings-updated: "✅ Ваш режим 2FA изменен на %mode%"

# Ответ при вводе неверного режима в /tg2fa settings.
mc-settings-invalid-mode: "❌ Неверный режим! Используйте: always, session, whitelist, disabled"

# Использование основной команды плагина.
tg-usage: "Использование: /tg2fa <link|settings|config|reload>"

# Сообщение для игроков без прав на использование команды.
tg-no-permission: "❌ У вас недостаточно прав для выполнения этой команды."

# Сообщение после выполнения /tg2fa link.
# %code% - Код привязки для игрока.
mc-link-code: "Ваш код привязки: %code%. Отправьте его боту в Telegram."

# Ответ на /tg2fa link, если аккаунт уже привязан.
mc-already-linked: "Ваш аккаунт уже привязан к Telegram."

# Сообщение игроку, когда администратор присылает сообщение из Telegram.
# %message% - Текст сообщения.
mc-msg-format: "[Консоль -> Вы] %message%"

# Ошибка при выполнении команды не игроком.
mc-player-only: "Эту команду могут использовать только игроки!"

# Ошибка при неудачном изменении конфига.
# %error% - Сообщение об ошибке.
mc-config-error: "❌ Ошибка при установке конфига: %error%"

# Причина кика в Minecraft, инициированного через бота.
mc-kick-reason: "Кикнут администратором через Telegram"

# Причина бана в Minecraft, инициированного через бота.
mc-ban-reason: "Забанен администратором через Telegram"


# --- Сообщения в Telegram (Бот) ---

# Уведомление о входе OP-игрока.
# %player% - Имя игрока.
tg-admin-join: "👤 Вход игрока: %player% (OP)"

# Уведомление о выходе OP-игрока.
tg-admin-quit: "👋 Выход игрока: %player% (OP)"

# Уведомление о выполнении команды OP-игроком.
# %command% - Выполненная команда.
tg-admin-cmd: "💻 Команда: %player% выполнил %command%"

# Оповещение о попытке входа с заблокированного IP.
# %ip% - IP-адрес.
tg-admin-blacklist-attempt: "🚫 Попытка входа с заблокированного IP: %player% (%ip%)"

# Оповещение о попытке входа непривязанного OP.
tg-admin-unlinked-attempt: "⚠️ Попытка входа не привязанного OP: %player% (%ip%)"

# Запрос 2FA, отправляемый боту при попытке входа.
tg-2fa-prompt: "🔑 Попытка входа с IP: %ip%\n\nИгрок: %player%"

# Подтверждение после одобрения входа.
tg-approved: "✅ IP %ip% одобрен для %player%"

# Уведомление после отклонения входа.
tg-denied: "❌ Вход отклонен для %ip%"

# Подтверждение после блокировки IP.
tg-blacklisted: "🚫 IP %ip% был заблокирован для игрока %player%"

# Заголовок меню управления игроком через бота.
tg-manage-player: "Управление игроком: %player%"

# Сообщение об успешном кике игрока.
tg-kicked: "✅ Кикнут %player%"

# Ошибка при попытке управлять игроком не в сети.
tg-not-online: "❌ Игрок не в сети."

# Сообщение об успешном бане игрока.
tg-banned: "✅ Забанен %player%"

# Запрос текста сообщения для отправки игроку.
tg-msg-prompt: "Введите сообщение для отправки %player%:"

# Подтверждение отправки сообщения в Minecraft.
tg-msg-sent: "✅ Сообщение отправлено %player%"

# Сообщение, когда на сервере нет игроков.
tg-no-players: "Нет игроков в сети."

# Заголовок меню выбора игрока.
tg-select-player: "Выберите игрока для управления:"

# Сообщение при отмене взаимодействия в боте.
tg-cancelled: "✅ Взаимодействие отменено."

# Сообщение об успешной привязке аккаунта.
tg-linked: "✅ Ваш аккаунт привязан к игроку Minecraft: %player%"

# Ошибка при попытке использовать админ-команды не админом.
tg-unauthorized: "🚫 У вас нет прав для выполнения RCON команд."

# Сообщение об использовании /rcon.
tg-rcon-usage: "Использование: /rcon &lt;команда&gt;"

# Сообщение об использовании /mclink.
tg-mclink-usage: "Использование: /mclink &lt;код&gt;"

# Ошибка при неверном или истекшем коде привязки.
tg-invalid-code: "❌ Неверный или истекший код."

# Уведомление о запуске сервера.
tg-server-start: "🚀 Сервер запущен!"

# Уведомление об остановке сервера.
tg-server-stop: "🛑 Сервер остановлен!"

# Ошибка при попытке редактирования конфига без прав.
tg-unauthorized-config: "❌ У вас нет прав для редактирования конфигурации."

# Сообщение об использовании команды конфига в боте.
# %path% - Путь в конфиге.
# %value% - Значение в конфиге.
tg-config-usage: "Использование: /tg2fa config <путь> <значение>"

# Подтверждение обновления конфига.
tg-config-updated: "✅ Конфигурация %path% установлена в %value%"

# Подтверждение после /tg2fa reload.
tg-reloaded: "✅ Конфигурация и сообщения плагина перезагружены."

# Заголовок меню настроек 2FA игрока.
tg-2fa-settings-menu: "Настройки 2FA для %player%:"

# Заголовок меню глобальных настроек 2FA по умолчанию.
tg-default-2fa-menu: "Настройки 2FA по умолчанию (для OP/новых игроков):"

# Метка текущего режима 2FA.
tg-2fa-mode-current: "Текущий режим: %mode%"

# Подтверждение после обновления режима 2FA для игрока.
tg-2fa-mode-updated: "✅ Режим 2FA для %player% обновлен на %mode%"

# Заголовок меню настроек уведомлений.
tg-settings-menu: "Настройки уведомлений:"

# Индикаторы статуса.
tg-enabled: "✅"
tg-disabled: "❌"

# Приветственное сообщение при команде /start.
# %chatId% - ID чата Telegram.
tg-start: "Привет! Ваш Chat ID: <code>%chatId%</code>\n\n<b>Как привязать аккаунт:</b>\n1. Зайдите на сервер Minecraft.\n2. Если ваш аккаунт не привязан, вы увидите 10-значный код в сообщении о кике.\n3. Отправьте этот код боту (например, <code>/mclink ABCDEFGHIJ</code> или просто <code>ABCDEFGHIJ</code>).\n\n<b>Команды бота:</b>\n/start - Показать это сообщение и главное меню\n/mclink &lt;код&gt; - Привязать ваш Minecraft аккаунт\n\n<b>Команды администратора (если есть доступ):</b>\n/players - Список и управление игроками онлайн\n/settings - Настройка уведомлений бота\n/rcon &lt;команда&gt; - Выполнить консольную команду (или просто /&lt;команда&gt;)\n/cancel - Отменить текущее действие"

# Заголовок меню управления своим аккаунтом.
tg-me-menu: "Управление аккаунтом: %player%"

# Подтверждение после блокировки своего текущего IP.
tg-blacklisted-self: "✅ Ваш текущий IP (%ip%) был заблокирован для аккаунта %player%."

# Ошибка, если нет привязанных аккаунтов.
tg-no-linked-accounts: "У вас нет привязанных аккаунтов."

# Заголовок меню выбора аккаунта для управления.
tg-select-account: "Выберите аккаунт для управления:"

# Заголовок меню выбора игрока для управления ЧС.
tg-blacklist-players-menu: "Выберите игрока для управления ЧС:"

# Заголовок меню черного списка IP игрока.
tg-blacklist-ips-menu: "Черный список IP для %player%:"

# Сообщение об успешном удалении IP из черного списка.
tg-ip-removed: "✅ IP %ip% удален из черного списка для %player%"

# Ошибка, когда в черном списке нет IP.
tg-no-blacklist-found: "Черный список пуст."

# Ошибка, когда у конкретного игрока нет заблокированных IP.
tg-no-blacklist-player: "Черный список для %player% пуст."

# Ошибка, когда одобренные IP не найдены.
tg-no-approved-ips: "Одобренные IP для %player% не найдены."

# Метка для постоянных IP в вайтлисте.
tg-time-permanent: "Навсегда"

# Заголовок для собственного черного списка.
tg-my-blacklist: "Ваш черный список IP (%player%):"

# Заголовок для собственного списка одобренных IP.
tg-my-whitelist: "Ваши одобренные IP (%player%):"

# Подтверждение удаления IP из списка одобренных.
tg-ip-removed-whitelist: "✅ IP %ip% удален из списка одобренных для %player%"


